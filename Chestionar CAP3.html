<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style_home.css">
    <title>Exerciții C++</title>
    <style>
        body {
            background-image: url("poza1.jpg");
            background-size: cover;
            margin: 0;
        }
        .white_rectangle {
            width: 100%;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.5);
            position: fixed;
            top: 0;
            left: 0;
        }
        .quiz_rectangle {
            width: 700px;
            height: 600px;
            background-color: rgba(64, 64, 161, 0.5);
            border-radius: 20px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid rgba(0, 0, 0, 0.5);
            padding: 20px;
            margin-top: 30px;
        }
        .quiz_title {
            font-family: 'Franklin Gothic Medium';
            color: #FFDAB9;
            font-size: 40px;
            margin-top: 10px;
        }
        .question {
            font-family: 'Franklin Gothic Medium';
            color: #FFDAB9;
            font-size: 15px;
            margin-top: 20px;
            text-align: left;
        }
        .result {
            margin-top: 10px;
            font-weight: bold;
            font-family: 'Franklin Gothic Medium';
            font-size: 20px;
        }
        .navigation {
            margin-top: 20px;
        }
        .navigation button {
            margin-right: 10px;
            background: #FFDAB9;
            font-family: 'Franklin Gothic Medium';
            font-size: 20px;
            color: black;
            width: 150px;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .navigation button:hover {
            background: #222;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="white_rectangle"></div>
    <div class="quiz_rectangle">
        <div class="quiz_title">Exercitii C++ operatori, operatii, expresii</div>
        <div class="question">
            <p id="question-text"></p> <br>
            <pre id="code-block"></pre>
        </div>
        <input type="text" id="answer" placeholder="Introduceți răspunsul aici" style="width: 90%; padding: 10px; border-radius: 4px; font-size: 20px; margin-bottom: 10px;">
        <button onclick="checkAnswer()" style="background: #FFDAB9; font-family: 'Franklin Gothic Medium'; font-size: 20px; color: black; padding: 10px; border-radius: 4px; cursor: pointer; transition: 0.3s;">Verificare</button>
        <div id="result" class="result"></div>
        <div class="navigation">
            <button onclick="prevQuestion()">Întrebarea anterioară</button>
            <button onclick="nextQuestion()">Întrebarea următoare</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                text: "Ce valoare are expresia:",
                code: `(4 + 3) * 2 - 5`,
                answer: "9"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int x = 6, y = 2; \ncout << (x += y) << endl;`,
                answer: "8"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int x = 5;\ncout << ++x * 2;`,
                answer: "12"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int x = 7, y = 3;\ncout << (x > y ? "x este mai mare" : "y este mai mare");`,
                answer: "x este mai mare"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int a = 25, b = 3, c = 4;\nint result = a / (b * c);\ncout<<result;`,
                answer: "2"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int a = 13, b = 5, c = 2;\nint result = (a - b) % c;\ncout<<result;`,
                answer: "0"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int x = 5;\ncout << x++ * 2;`,
                answer: "10"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int a = 12;\ncout<<a--;`,
                answer: "12"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int x = 5;\ncout << x-- << --x;`,
                answer: "53"
            },
            {
                text: "Ce se va afisa dupa urmatoarea secventa?",
                code: `int a = 7;\ncout << --a << a-- << a;`,
                answer: "665"
            }

        ];

        let currentQuestionIndex = 0;

        function displayQuestion(index) {
            const question = questions[index];
            document.getElementById('question-text').textContent = question.text;
            document.getElementById('code-block').textContent = question.code;
            document.getElementById('answer').value = '';
            document.getElementById('result').textContent = '';
        }

        function checkAnswer() {
            const userAnswer = document.getElementById('answer').value;
            const resultElement = document.getElementById('result');
            
            if (userAnswer.trim() === questions[currentQuestionIndex].answer) {
                resultElement.textContent = "Corect!";
                resultElement.style.color = "green";
            } else {
                resultElement.textContent = "Greșit, mai încearcă!";
                resultElement.style.color = "red";
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuestion(currentQuestionIndex);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion(currentQuestionIndex);
            }
        }

        displayQuestion(currentQuestionIndex);
    </script>
    <label>
        <input type="checkbox">
        <div class="toggle"></div>
        <div class="slide">
            <h1>Menu</h1>
            <ul>
                <li><a href="home_page.html" target="_blank">home</a></li>
                <li><a href="mediu_de_invatare.html" target="_blank">Mediu de invatare</a> </li>
                <li><a href="test_level.html">Your level in C++</a></li>
            </ul>
        </div>
    </label>
</body>
</html>
