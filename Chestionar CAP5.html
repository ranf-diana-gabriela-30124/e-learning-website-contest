<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style_home.css">
    <title>Exerciții C++</title>
    <style>
        body {
            background-image: url("poza1.jpg");
            background-size: cover;
            margin: 0;
        }
        .white_rectangle {
            width: 100%;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.5);
            position: fixed;
            top: 0;
            left: 0;
        }
        .quiz_rectangle {
            width: 700px;
            height: 600px;
            background-color: rgba(64, 64, 161, 0.5);
            border-radius: 20px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 3px solid rgba(0, 0, 0, 0.5);
            padding: 20px;
            margin-top: 30px;
        }
        .quiz_title {
            font-family: 'Franklin Gothic Medium';
            color: #FFDAB9;
            font-size: 40px;
            margin-top: 10px;
        }
        .question {
            font-family: 'Franklin Gothic Medium';
            color: #FFDAB9;
            font-size: 15px;
            margin-top: 20px;
            text-align: left;
        }
        .result {
            margin-top: 10px;
            font-weight: bold;
            font-family: 'Franklin Gothic Medium';
            font-size: 20px;
        }
        .navigation {
            margin-top: 20px;
        }
        .navigation button {
            margin-right: 10px;
            background: #FFDAB9;
            font-family: 'Franklin Gothic Medium';
            font-size: 20px;
            color: black;
            width: 150px;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .navigation button:hover {
            background: #222;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="white_rectangle"></div>
    <div class="quiz_rectangle">
        <div class="quiz_title">Exercitii C++ strucuri</div>
        <div class="question">
            <p id="question-text"></p> <br>
            <pre id="code-block"></pre>
        </div>
        <input type="text" id="answer" placeholder="Introduceți răspunsul aici" style="width: 90%; padding: 10px; border-radius: 4px; font-size: 20px; margin-bottom: 10px;">
        <button onclick="checkAnswer()" style="background: #FFDAB9; font-family: 'Franklin Gothic Medium'; font-size: 20px; color: black; padding: 10px; border-radius: 4px; cursor: pointer; transition: 0.3s;">Verificare</button>
        <div id="result" class="result"></div>
        <div class="navigation">
            <button onclick="prevQuestion()">Întrebarea anterioară</button>
            <button onclick="nextQuestion()">Întrebarea următoare</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                text: "Pentru declaratiile alaturate, care este numarul maxim de numere intregi ce pot fi memorate în variabila a?",
                code: `struct punct3D {\nint x; int y; int z;};\nstruct punct3D a[10][10];`,
                answer: "300"
            },
            {
                text: "Cum se poate accesa prima litera a denumirii unui material ale carui caracteristici sunt memorate în variabila m, declarata mai jos?",
                code: `struct material{\nchar denumire[20];\nint pret;} m;`,
                answer: "m.denumire[0]"
            },
            {
                text: "Stiind că fiecare dintre variabilele var1, var2 memoreaza numele si nota cate unui elev în forma data de declararea urmatoare, indicati o instructiune, in urma executarii, memoreaza in variabila reala m media aritmetice a notelor celor doi elevi.",
                code: `struct elev {\nchar nume[30];\nfloat nota; \n}var1,var2;`,
                answer: "m=(var1.nota+var2.nota)/2;"
            },
            {
                text: "În declararea de mai jos, variabila m memorează anul fabricaţiei şi marca unei maşini. Indicaţi o expresie C/C++ care verifica daca maşina a fost fabricată înainte de anul 1950.",
                code: `struct masina\n{ int an_fabricatie;\nchar marca[20];\n} m;`,
                answer: "m.an_fabricatie<1950"
            },
            {
                text: "Atriubiti variabilei 'valoare' produsul dintre cantitatea si pretul produsului x",
                code: `struct produs\n{ char denumire[50];\nfloat cantitate, pret;\n}x;\nfloat valoare;`,
                answer: "valoare=x.cantitate*x.pret;"
            }
        ];

        let currentQuestionIndex = 0;

        function displayQuestion(index) {
            const question = questions[index];
            document.getElementById('question-text').textContent = question.text;
            document.getElementById('code-block').textContent = question.code;
            document.getElementById('answer').value = '';
            document.getElementById('result').textContent = '';
        }

        function checkAnswer() {
            const userAnswer = document.getElementById('answer').value;
            const resultElement = document.getElementById('result');
            
            if (userAnswer.trim() === questions[currentQuestionIndex].answer) {
                resultElement.textContent = "Corect!";
                resultElement.style.color = "green";
            } else {
                resultElement.textContent = "Greșit, mai încearcă!";
                resultElement.style.color = "red";
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuestion(currentQuestionIndex);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion(currentQuestionIndex);
            }
        }

        displayQuestion(currentQuestionIndex);
    </script>
    <label>
        <input type="checkbox">
        <div class="toggle"></div>
        <div class="slide">
            <h1>Menu</h1>
            <ul>
                <li><a href="home_page.html" target="_blank">home</a></li>
                <li><a href="mediu_de_invatare.html" target="_blank">Mediu de invatare</a> </li>
                <li><a href="test_level.html">Your level in C++</a></li>
            </ul>
        </div>
    </label>
</body>
</html>
