<!DOCTYPE html>
<html>
<head>
    <title>Have a plus in C++</title>
    <link rel="stylesheet" type="text/css" href="style_test_level.css">
    <style>
        body {
            background-image: url("poza1.jpg");
			background-size:cover;
			margin-top: 0;
			margin-left:0;
        }
		.white_rectangle {
            width: 1000vh; 
            height: 100px; 
            background-color: rgba(255, 255, 255, 0.5) ;
			position: fixed;
        }
        .quiz_rectangle{
            width:700px;
            height:550px;
            background-color: rgba(64, 64, 161, 0.5);
            border-radius: 20px;
            text-align: center;
            position: absolute;
            margin-top: 130px;
            margin-left: 400px;
            border: 3px solid rgba(0, 0, 0, 0.5);

        }

        .quiz_title{
            font-family:'Franklin Gothic Medium';
            color:#FFDAB9;
            font-size: 40px;
            margin-top: 30px;
            margin-left: 30px;
        }
        .quiz{
            font-family:'Franklin Gothic Medium';
            color:#FFDAB9;
            font-size: 15px;
            margin-top: 10px;
            margin-left: 30px; 
        }
        .answer{
            background-color: white;
            color: black;
            font-family: 'Franklin Gothic Medium';
            font-size: 20px;
            width: 90%;
            border: 1px solid #222;
            padding: 10px;
            margin: 10px 0;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .answer:hover:not([disabled]){
            background: #222;
            color: #fff;
        }
        .answer:disabled{
            cursor: no-drop;
        }
        .next_button{
            background:#FFDAB9;
            font-family: 'Franklin Gothic Medium';
            font-size: 20px;
            color: black ;
            width: 150px;
            padding:10px;
            border-radius: 4px;
            cursor:pointer;
            transition: 0.3s;
        }
        .next_button:hover{
            background: #222;
            color: #fff;
        }
        .correct{
        background: #9aeabc;
        }
    .incorrect{
        background: #ff9393;
    }
    .programming{
        margin-top: 140px;
        margin-left: 900px;
        border-radius: 20px;
        height: 510px;
        position: absolute;
    }
    .subcapitole{
			margin-left: 100px;
			list-style-type:square;
			color: beige;
		}
    .explicatii{
        margin-top: 5px;
    }
    .chapters{
        font-size: 20px;
        text-align: justify;
        color: white;
    }
 </style>
</head>
<body>
    <div class="white_rectangle"></div>
    <div class="quiz_rectangle">
        <div class="quiz_title">
            <h1 class="quiz_title">Test your level now!</h1>
            <div class="quiz"> 
                <h2 id="question">Question</h2>
                <div id="answer-button">
                    <button class="answer">Answer1</button>
                    <button class="answer">Answer2</button>
                    <button class="answer">Answer3</button>
                    <button class="answer">Answer4</button>
                </div>
                <button class="next_button" id="next-button">Next</button>
                <div class="explicatii" id="explication"></div>
            </div>
            <div id="capitol_work">
                <ul class="chapters" id="chapter-list"></ul>
            </div>
        </div>
    </div>
    <script src="script_test_level.js"></script>

                <li><a href="test_level.html">Your level in C++</a></li>
            </ul>
        </div>
    </label>
    
</body>
